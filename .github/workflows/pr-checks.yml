name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "package.json"
      - "package-lock.json"
      - "script/coin-price-data-fetcher/package.json"
      - "script/coin-price-data-fetcher/package-lock.json"
      - ".github/workflows/**"
      - "Dockerfile"
  pull_request_review:
    types: [submitted]

jobs:
  lint:
    if: >-
      (github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]') ||
      (github.event_name == 'pull_request_review' &&
        (github.event.review.state == 'approved' || contains(github.event.review.body, '/check')))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '14.17.6'
      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm # npm cache files are stored in `~/.npm` on Linux/macOS
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-
      - name: install
        run: |
          npm install
      - name: run eslint
        run: |
          npm run eslint
  prettier:
    if: >-
      (github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]') ||
      (github.event_name == 'pull_request_review' &&
        (github.event.review.state == 'approved' || contains(github.event.review.body, '/check')))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '14.17.6'
      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm # npm cache files are stored in `~/.npm` on Linux/macOS
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-
      - name: install
        run: |
          npm install
      - name: run prettier
        run: |
          npx prettier --check src
